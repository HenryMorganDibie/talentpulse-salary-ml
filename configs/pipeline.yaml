# TalentPulse Salary ML Pipeline — Configuration
#
# All tuneable parameters are defined here.
# Import via src/config.py — do not read this file directly in src modules.

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  raw_path: "data/raw/jobs_dataset.xlsx"
  expected_countries:
    - USA
    - UK
    - Canada
    - Australia
    - India
  expected_job_levels:
    - Junior
    - Mid
    - Senior
    - Lead
  senior_levels:          # levels that map to is_senior=1
    - Senior
    - Lead

# ── Feature engineering ───────────────────────────────────────────────────────
features:
  top_skills:
    - python
    - sql
    - spark
    - aws
  ohe_columns:
    - job_level
    - country
  experience_tier_breaks:  # upper bounds (inclusive) for tiers 0, 1, 2; 3 = remainder
    - 2    # tier 0: 0–2 yrs
    - 5    # tier 1: 3–5 yrs
    - 9    # tier 2: 6–9 yrs

# ── Train / test split ────────────────────────────────────────────────────────
split:
  test_size: 0.2
  random_state: 42
  stratify_col: job_level

# ── Ridge hyperparameter search ───────────────────────────────────────────────
ridge:
  alpha_log_min: -2       # 10^-2 = 0.01
  alpha_log_max: 4        # 10^4  = 10,000
  n_alphas: 30
  cv_folds: 5

# ── Random Forest grid search ─────────────────────────────────────────────────
random_forest:
  param_grid:
    n_estimators: [100, 200]
    max_depth: [8, 12, null]   # null → no depth limit (sklearn None)
  cv_folds: 5
  depth_curve_n_estimators: 100   # used only for overfitting diagnostic

# ── Gradient Boosting grid search ─────────────────────────────────────────────
gradient_boosting:
  param_grid:
    n_estimators: [100, 200]
    learning_rate: [0.05, 0.1]
    max_depth: [4, 6]
  cv_folds: 5

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  legacy_mae: 18500           # legacy lookup-table MAE (USD) — business baseline
  industry_target_mae: 8000   # industry benchmark MAE (USD)
  vif_threshold: 10           # features with VIF above this are flagged
  overfit_gap_threshold: 0.05 # train-test R² gap that marks overfitting onset

# ── Output paths ──────────────────────────────────────────────────────────────
output:
  reports_dir: "reports"
  figures_dir: "reports/figures"
  models_dir:  "models"
  metrics_file: "reports/metrics.json"
